uiPod:
  image: kernel-ui:latest
  imagePullPolicy: IfNotPresent
  replicas: 1
  port: 8000

workerPod:
  image: kernel-worker:latest
  imagePullPolicy: IfNotPresent
  port: 8001
  resources:
    requests:
      cpu: "500m"
      memory: "512Mi"
    limits:
      cpu: "2"
      memory: "2Gi"

storage:
  size: 10Gi
  storageClass: standard
  accessMode: ReadWriteMany

ingress:
  enabled: true
  host: notebook.local

namespace: default
